services:
  tardis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poc-lighter-hyperliquid-tardis
    restart: "no"
    init: true
    environment:
      TARDIS_CONFIG: /app/config.yaml
      TARDIS_R2_CONFIG: /app/config.yaml
      TARDIS_DATA_TYPES: trades # Repair bybit PERPETUALS gaps in 2025-11-11..2025-11-25; existing days will be skipped
      TARDIS_FROM_DATE: "2025-11-11"
      TARDIS_TO_DATE: "2025-11-25"
      TARDIS_EXCHANGE_SYMBOLS: "bybit=PERPETUALS"
      TARDIS_BITGET_SYMBOLS: ""
      TARDIS_HYPERLIQUID_SYMBOLS: ""
      TARDIS_CONCURRENCY: "1"
      TARDIS_TEMP_DIR: /app/data/raw/tardis
      TARDIS_SHOW_RETRY_ERRORS: "0"
      TARDIS_EXTRA_ARGS: ""
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
