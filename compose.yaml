services:
  tardis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poc-lighter-hyperliquid-tardis
    restart: "no"
    init: true
    environment:
      TARDIS_CONFIG: /app/config.yaml
      TARDIS_R2_CONFIG: /app/config.yaml
      TARDIS_DATA_TYPES: incremental_book_L2 # Explicit Bitget quotes symbol list for 2025-10-01..2026-02-28
      TARDIS_MONTH: ""
      TARDIS_FROM_DATE: "2025-10-01"
      TARDIS_TO_DATE: "2026-02-28"
      TARDIS_EXCHANGE_SYMBOLS: >-
        bitget-futures=BTCPERP,ETHPERP,SOLPERP,NEARPERP,XRPPERP,TRUMPPERP,
        FILPERP,DOTPERP,LINKPERP,PEPEPERP,ADAPERP,BNBPERP,ETHFIPERP,EIGENPERP,
        HBARPERP,POLPERP,ETCPERP,SUIPERP,BCHPERP,IPPERP,BOMEPERP,AVAXPERP,
        ONDOPERP,DOGEPERP,CRVPERP,TIAPERP,WLFIPERP,FARTCOINPERP,UNIPERP,
        LTCPERP,XLMPERP,WLDPERP,ARBPERP,1000BONKPERP,GALAPERP,SHIBPERP,
        BERAPERP,WIFPERP,STRKPERP,POPCATPERP,APTPERP,PENGUPERP,ENAPERP,
        AAVEPERP,NEOPERP
      TARDIS_BITGET_SYMBOLS: ""
      TARDIS_HYPERLIQUID_SYMBOLS: ""
      TARDIS_CONCURRENCY: "5"
      TARDIS_TEMP_DIR: /app/data/raw/tardis
      TARDIS_SHOW_RETRY_ERRORS: "0"
      TARDIS_EXTRA_ARGS: ""
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
