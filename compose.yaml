services:
  tardis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poc-lighter-hyperliquid-tardis
    restart: "no"
    init: true
    environment:
      TARDIS_CONFIG: /app/config.yaml
      TARDIS_R2_CONFIG: /app/config.yaml
      TARDIS_DATA_TYPES: incremental_book_L2,book_snapshot_25,quotes # Bybit + Bitget futures, October 2025
      TARDIS_MONTH: "2025-10"
      TARDIS_FROM_DATE: ""
      TARDIS_TO_DATE: ""
      TARDIS_EXCHANGE_SYMBOLS: >-
        bybit=AAVEUSDT,ADAUSDT,APTUSDT,AVAXUSDT,BCHUSDT,BTCUSDT,DOGEUSDT,
        DOTUSDT,ETCUSDT,ETHUSDT,FILUSDT,LINKUSDT,LTCUSDT,MANAUSDT,NEARUSDT,
        OPUSDT,SOLUSDT,SUIUSDT,UNIUSDT,WIFUSDT,XLMUSDT,XRPUSDT;
        bitget-futures=AAVEUSDT,ADAUSDT,APTUSDT,AVAXUSDT,BCHUSDT,BTCUSDT,
        DOGEUSDT,DOTUSDT,ETCUSDT,ETHUSDT,FILUSDT,LINKUSDT,LTCUSDT,MANAUSDT,
        NEARUSDT,OPUSDT,SOLUSDT,SUIUSDT,UNIUSDT,WIFUSDT,XLMUSDT,XRPUSDT
      TARDIS_BITGET_SYMBOLS: ""
      TARDIS_HYPERLIQUID_SYMBOLS: ""
      TARDIS_CONCURRENCY: "1"
      TARDIS_TEMP_DIR: /app/data/raw/tardis
      TARDIS_SHOW_RETRY_ERRORS: "0"
      TARDIS_EXTRA_ARGS: ""
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
