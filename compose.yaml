services:
  tardis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poc-lighter-hyperliquid-tardis
    restart: "no"
    init: true
    environment:
      TARDIS_CONFIG: /app/config.yaml
      TARDIS_R2_CONFIG: /app/config.yaml
      TARDIS_DATA_TYPES: book_snapshot_5 # derivative_ticker, trades, incremental_book_L2,quotes,book_snapshot_5,book_snapshot_25,liquidations
      TARDIS_MONTH: ""
      TARDIS_FROM_DATE: "2025-10-01"
      TARDIS_TO_DATE: "2026-02-28"
      TARDIS_EXCHANGE_SYMBOLS: "bitget=PERPETUALS" # e.g. bybit=PERPETUALS;hyperliquid=PERPETUALS,bitget=PERPETUALS
      TARDIS_BITGET_SYMBOLS: ""
      TARDIS_HYPERLIQUID_SYMBOLS: ""
      TARDIS_CONCURRENCY: "5"
      TARDIS_TEMP_DIR: /app/data/raw/tardis
      TARDIS_SHOW_RETRY_ERRORS: "0"
      TARDIS_EXTRA_ARGS: ""
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
